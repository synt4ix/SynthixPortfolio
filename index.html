<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthix — Portfolio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#000;
  --bg2:#0a0a0a;
  --bg3:#141414;
  --bg4:#1c1c1e;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --text:#f5f5f7;
  --text2:#a1a1a6;
  --text3:#6e6e73;
  --accent:#2997ff;
  --radius:18px;
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  background:rgba(0,0,0,0.8);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
  height:48px;
  display:flex;
  align-items:center;
}
.nav-inner{
  max-width:1200px;
  margin:0 auto;
  padding:0 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
}
.nav-logo{
  font-size:17px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-0.3px;
  text-decoration:none;
}
.nav-links{display:flex;gap:28px;}
.nav-link{
  font-size:12px;
  color:var(--text2);
  text-decoration:none;
  transition:color .2s;
  letter-spacing:0.2px;
}
.nav-link:hover{color:var(--text)}
@media(max-width:600px){.nav-links{display:none}}

/* HERO */
.hero{
  padding:160px 22px 100px;
  text-align:center;
  max-width:1200px;
  margin:0 auto;
}
.hero-eyebrow{
  font-size:13px;
  font-weight:500;
  color:var(--accent);
  letter-spacing:0.5px;
  text-transform:uppercase;
  margin-bottom:16px;
  opacity:0;
  animation:fadeUp .8s .1s ease forwards;
}
.hero h1{
  font-size:clamp(52px,9vw,96px);
  font-weight:700;
  letter-spacing:-3.5px;
  line-height:1.0;
  color:var(--text);
  margin-bottom:22px;
  opacity:0;
  animation:fadeUp .8s .2s ease forwards;
}
.hero h1 em{
  font-style:normal;
  background:linear-gradient(135deg,#f5f5f7 0%,#6e6e73 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.visit-counter{
  margin-top:20px;
  opacity:0;
  animation:fadeUp .8s .4s ease forwards;
}
.visit-counter img{
  height:22px;
  border-radius:6px;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* SECTION */
.section{
  padding:80px 22px;
  max-width:1200px;
  margin:0 auto;
}
.section-label{
  font-size:12px;
  font-weight:600;
  color:var(--text3);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.section-title{
  font-size:clamp(28px,4vw,48px);
  font-weight:700;
  letter-spacing:-1.5px;
  color:var(--text);
  margin-bottom:8px;
  line-height:1.1;
}
.section-sub{
  font-size:17px;
  font-weight:300;
  color:var(--text2);
  margin-bottom:28px;
  letter-spacing:-0.2px;
}

/* BENTO */
.bento{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:6px;
}
@media(max-width:900px){.bento{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.bento{grid-template-columns:1fr;}}
.bento-card{
  position:relative;
  overflow:hidden;
  background:#111;
  border-radius:0;
  min-height:340px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.04);
  transition:transform .28s ease, border-color .28s ease;
}
.bento-card:hover{
  transform:scale(0.99);
  border-color:rgba(255,255,255,0.12);
}
.bento-card img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  transition:transform .45s ease;
}
.bento-card:hover img{transform:scale(1.03);}
.bento-card.is-thumb{
  min-height:500px;
  grid-column:span 2;
}
@media(max-width:900px){
  .bento-card.is-thumb{
    grid-column:span 2;
    min-height:400px;
  }
}
@media(max-width:560px){
  .bento-card.is-thumb{
    grid-column:span 1;
    min-height:320px;
  }
}
.bento-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.15) 45%, transparent 70%);
  display:flex;
  align-items:flex-end;
  padding:22px;
}
.bento-meta{
  display:flex;
  flex-direction:column;
  gap:3px;
}
.bento-name{
  font-size:18px;
  font-weight:600;
  color:#fff;
  letter-spacing:-0.2px;
}
.bento-type{
  font-size:12px;
  color:rgba(255,255,255,0.7);
  text-transform:uppercase;
  letter-spacing:0.6px;
}
.state-box{
  grid-column:1/-1;
  padding:100px 20px;
  text-align:center;
}
.state-icon{
  width:60px;
  height:60px;
  background:var(--bg4);
  border-radius:14px;
  margin:0 auto 18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
}
.state-title{
  font-size:19px;
  font-weight:600;
  color:var(--text);
  margin-bottom:6px;
  letter-spacing:-0.3px;
}
.state-sub{
  font-size:14px;
  color:var(--text3);
}
.spinner{
  width:22px;
  height:22px;
  border:2px solid var(--border2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* DIVIDER */
.divider{
  height:1px;
  background:var(--border);
  max-width:1200px;
  margin:0 auto;
}

/* COMMUNITIES */
.comm-group{margin-bottom:56px;}
.comm-group:last-child{margin-bottom:0;}

.comm-group-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
}

.comm-group-label{
  font-size:11px;
  font-weight:600;
  letter-spacing:.8px;
  text-transform:uppercase;
  padding:0;
  border:none;
  background:none;
  color:var(--text3);
  white-space:nowrap;
}

.comm-group-line{
  flex:1;
  height:1px;
  background:var(--border);
}

.comm-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
  gap:16px;
}

.discord-card{
  position:relative;
  overflow:hidden;
  display:block;
  text-decoration:none;
  color:inherit;
  background:linear-gradient(180deg, rgba(28,28,30,0.92) 0%, rgba(16,16,18,0.96) 100%);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:26px;
  padding:22px;
  min-height:220px;
  backdrop-filter:saturate(160%) blur(22px);
  -webkit-backdrop-filter:saturate(160%) blur(22px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 10px 30px rgba(0,0,0,0.28);
  transition:
    transform .35s cubic-bezier(.22,1,.36,1),
    border-color .35s ease,
    background .35s ease,
    box-shadow .35s ease;
}

.discord-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top left, rgba(255,255,255,0.07), transparent 42%);
  pointer-events:none;
}

.discord-card::after{
  content:'';
  position:absolute;
  inset:auto 0 0 0;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.09), transparent);
  pointer-events:none;
}

.discord-card:hover{
  transform:translateY(-4px);
  border-color:rgba(255,255,255,0.14);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 18px 44px rgba(0,0,0,0.34);
}

.dc-top{
  display:flex;
  align-items:flex-start;
  gap:14px;
  margin-bottom:14px;
  position:relative;
  z-index:1;
}

.dc-logo{
  width:48px;
  height:48px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
}

.dc-logo svg{
  width:22px;
  height:22px;
  fill:rgba(255,255,255,0.92);
}

.dc-info{
  flex:1;
  min-width:0;
}

.dc-platform{
  font-size:11px;
  font-weight:500;
  color:var(--text3);
  letter-spacing:.6px;
  text-transform:uppercase;
  margin-bottom:4px;
}

.dc-name{
  font-size:21px;
  font-weight:600;
  letter-spacing:-0.6px;
  line-height:1.08;
  color:var(--text);
}

.dc-role-badge{
  flex-shrink:0;
  font-size:11px;
  font-weight:500;
  letter-spacing:.3px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text2);
}

.dc-desc{
  position:relative;
  z-index:1;
  font-size:14px;
  line-height:1.65;
  font-weight:400;
  letter-spacing:-0.15px;
  color:var(--text2);
  margin-bottom:16px;
  max-width:52ch;
}

.dc-desc strong{
  color:var(--text);
  font-weight:500;
}

.dc-tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  position:relative;
  z-index:1;
  margin-bottom:18px;
}

.dc-tag{
  font-size:11px;
  font-weight:500;
  color:var(--text2);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:999px;
  padding:6px 10px;
  letter-spacing:-0.1px;
}

.dc-cta{
  position:relative;
  z-index:1;
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  font-weight:500;
  letter-spacing:-0.1px;
  color:var(--text);
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:999px;
  padding:10px 14px;
  transition:
    background .25s ease,
    border-color .25s ease,
    transform .25s ease;
}

.dc-cta:hover{
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.14);
  transform:translateY(-1px);
}

.dc-cta svg{
  width:12px;
  height:12px;
  fill:currentColor;
  opacity:.82;
}

.dc-arrow{
  position:absolute;
  top:18px;
  right:18px;
  width:30px;
  height:30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  z-index:1;
  transition:
    background .25s ease,
    border-color .25s ease,
    transform .25s ease;
}

.dc-arrow svg{
  width:10px;
  height:10px;
  stroke:rgba(255,255,255,0.56);
  fill:none;
  stroke-width:2;
  transition:stroke .25s ease;
}

.discord-card:hover .dc-arrow{
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.11);
  transform:translateY(-1px);
}

.discord-card:hover .dc-arrow svg{
  stroke:rgba(255,255,255,0.86);
}

@media(max-width:640px){
  .comm-grid{
    grid-template-columns:1fr;
    gap:14px;
  }

  .discord-card{
    border-radius:22px;
    padding:20px;
    min-height:auto;
  }

  .dc-name{
    font-size:19px;
  }

  .dc-role-badge{
    display:none;
  }
}

/* FOOTER */
footer{
  padding:44px 22px;
  border-top:1px solid var(--border);
  max-width:1200px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}
.footer-logo{
  font-size:14px;
  font-weight:600;
  color:var(--text3);
}
.footer-copy{
  font-size:12px;
  color:var(--text3);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  z-index:999;
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
  padding:20px;
}
.lightbox.open{
  opacity:1;
  pointer-events:all;
}
.lb-inner{
  max-width:min(88vw,900px);
  width:100%;
}
.lb-inner img{
  width:100%;
  border-radius:14px;
  max-height:70vh;
  object-fit:contain;
  display:block;
  margin:0 auto 22px;
  box-shadow:0 32px 80px rgba(0,0,0,0.6);
}
.lb-meta{text-align:center}
.lb-name{
  font-size:22px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-0.5px;
  margin-bottom:6px;
}
.lb-desc{
  font-size:15px;
  color:var(--text2);
  font-weight:300;
  line-height:1.5;
}
.lb-tag{
  display:inline-block;
  margin-top:12px;
  font-size:11px;
  font-weight:500;
  color:var(--accent);
  background:rgba(41,151,255,0.12);
  padding:4px 14px;
  border-radius:20px;
  letter-spacing:0.5px;
  text-transform:uppercase;
}
.lb-close{
  position:fixed;
  top:18px;
  right:18px;
  width:36px;
  height:36px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:1px solid var(--border2);
  color:var(--text2);
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all .2s;
}
.lb-close:hover{
  background:rgba(255,255,255,0.18);
  color:var(--text);
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(22px);
  transition:opacity .7s ease,transform .7s ease;
}
.reveal.visible{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="#">Synthix</a>
    <div class="nav-links">
      <a class="nav-link" href="#portfolio">Portfolio</a>
      <a class="nav-link" href="#communities">Communities</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Creative Work</div>
  <h1>Synthix's<br><em>Portfolio.</em></h1>
  <div class="visit-counter">
    <img src="https://hits.sh/iced2006.github.io/MyWebsite.svg?style=flat-square&label=visits&color=2997ff&labelColor=1c1c1e" alt="visits">
  </div>
</div>

<div class="divider"></div>

<!-- PORTFOLIO -->
<section class="section" id="portfolio">
  <div class="reveal">
    <div class="section-label">Work</div>
    <div class="section-title">My Work</div>
    <p class="section-sub" id="portfolio-sub">Loading...</p>
  </div>
  <div class="bento reveal" id="portfolio-grid">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">Loading</div>
      <div class="state-sub">Fetching portfolio...</div>
    </div>
  </div>
</section>

<div class="divider"></div>

<!-- COMMUNITIES -->
<section class="section" id="communities">
  <div class="reveal">
    <div class="section-label">Community</div>
    <div class="section-title">Communities I’m part of.</div>
    <p class="section-sub">Places I build, contribute, and stay active in.</p>
  </div>

  <div class="comm-group reveal" id="group-owner">
    <div class="comm-group-header">
      <span class="comm-group-label">Owned</span>
      <div class="comm-group-line"></div>
    </div>
    <div class="comm-grid" id="grid-owner"></div>
  </div>

  <div class="comm-group reveal" id="group-contributor">
    <div class="comm-group-header">
      <span class="comm-group-label">Contributing</span>
      <div class="comm-group-line"></div>
    </div>
    <div class="comm-grid" id="grid-contributor"></div>
  </div>
</section>

<footer>
  <div class="footer-logo">Synthix</div>
  <div class="footer-copy">© 2025 Synthix. All rights reserved.</div>
</footer>

<div class="lightbox" id="lightbox" onclick="closeLb(event)">
  <div class="lb-close" onclick="closeLb()">✕</div>
  <div class="lb-inner">
    <img id="lb-img" src="" alt="">
    <div class="lb-meta">
      <div class="lb-name" id="lb-name"></div>
      <div class="lb-desc" id="lb-desc"></div>
      <div class="lb-tag" id="lb-tag"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DISCORD / COMMUNITIES
// role: "owner" or "contributor"
// ═══════════════════════════════════════════════════════════════
const DISCORD_SERVERS = [
  {
    name: "Synthix HQ",
    invite: "https://discord.gg/DEIN-INVITE",
    description: "A community I run where I share projects, build ideas, and connect with people into design and creative work.",
    tags: ["Design", "Bots", "Creative", "Roblox"],
    role: "owner",
    active: true
  },
  // Example:
  // {
  //   name: "Cool Community",
  //   invite: "https://discord.gg/...",
  //   description: "A community I contribute to and help shape behind the scenes.",
  //   tags: ["Community", "Art"],
  //   role: "contributor",
  //   active: true
  // },
];

// Discord Icon
const DISCORD_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.08.11 18.1.128 18.113a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>`;

// Build single card
function buildCard(s) {
  const isOwner = s.role === "owner";
  const roleLabel = isOwner ? "Owner" : "Contributor";
  const tags = (s.tags || []).map(t => `<span class="dc-tag">${t}</span>`).join('');

  return `
    <a class="discord-card" href="${s.invite}" target="_blank" rel="noopener noreferrer">
      <div class="dc-arrow">
        <svg viewBox="0 0 12 12">
          <path d="M2.5 9.5L9.5 2.5M9.5 2.5H4M9.5 2.5V8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="dc-top">
        <div class="dc-logo">${DISCORD_SVG}</div>
        <div class="dc-info">
          <div class="dc-platform">Community</div>
          <div class="dc-name">${s.name}</div>
        </div>
        <span class="dc-role-badge">${roleLabel}</span>
      </div>

      <p class="dc-desc">${s.description}</p>

      <div class="dc-tags">${tags}</div>

      <div class="dc-cta">
        <span>Open Community</span>
        <svg viewBox="0 0 12 12">
          <path d="M2.5 9.5L9.5 2.5M9.5 2.5H4M9.5 2.5V8" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>`;
}

// Render groups
function renderCommunities() {
  const owned = DISCORD_SERVERS.filter(s => s.role === "owner");
  const contrib = DISCORD_SERVERS.filter(s => s.role === "contributor");

  const ownerGrid = document.getElementById('grid-owner');
  const contGrid = document.getElementById('grid-contributor');
  const ownerGrp = document.getElementById('group-owner');
  const contGrp = document.getElementById('group-contributor');

  if (owned.length) {
    ownerGrid.innerHTML = owned.map(buildCard).join('');
  } else {
    ownerGrp.style.display = 'none';
  }

  if (contrib.length) {
    contGrid.innerHTML = contrib.map(buildCard).join('');
  } else {
    contGrp.style.display = 'none';
  }
}

// Reveal
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      obs.unobserve(e.target);
    }
  });
}, { threshold: 0.08 });

document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

// Lightbox
function openLb(item) {
  document.getElementById('lb-img').src = item.image_url || '';
  document.getElementById('lb-img').alt = item.name || '';
  document.getElementById('lb-name').textContent = item.name || '';
  document.getElementById('lb-desc').textContent = item.description || '';
  document.getElementById('lb-tag').textContent = item.type || 'Work';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLb(e) {
  const lb = document.getElementById('lightbox');
  if (e && e.target !== lb && !e.target.classList.contains('lb-close')) return;
  lb.classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// Portfolio
async function load() {
  const grid = document.getElementById('portfolio-grid');
  const sub = document.getElementById('portfolio-sub');

  try {
    const res = await fetch('logos.json?t=' + Date.now());
    if (!res.ok) throw new Error();

    const logos = await res.json();
    grid.innerHTML = '';

    if (!Array.isArray(logos) || !logos.length) {
      sub.textContent = 'No projects yet.';
      grid.innerHTML = `
        <div class="state-box">
          <div class="state-icon">🖼️</div>
          <div class="state-title">Nothing here yet</div>
          <div class="state-sub">Check back soon.</div>
        </div>`;
      return;
    }

    sub.textContent = logos.length + ' project' + (logos.length !== 1 ? 's' : '');

    logos.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'bento-card' + ((item.type || '').toLowerCase() === 'thumbnail' ? ' is-thumb' : '');
      card.innerHTML = `
        <img src="${item.image_url || ''}" alt="${item.name || ''}" loading="${i < 3 ? 'eager' : 'lazy'}" onerror="this.style.display='none';this.parentElement.style.background='#1c1c1e';">
        <div class="bento-overlay">
          <div class="bento-meta">
            <div class="bento-name">${item.name || 'Untitled'}</div>
            <div class="bento-type">${item.type || 'Work'}</div>
          </div>
        </div>`;
      card.addEventListener('click', () => openLb(item));
      grid.appendChild(card);
    });

    obs.observe(grid);
  } catch {
    sub.textContent = '';
    grid.innerHTML = `
      <div class="state-box">
        <div class="state-icon">🖼️</div>
        <div class="state-title">Nothing here yet</div>
        <div class="state-sub">Check back soon.</div>
      </div>`;
  }
}

renderCommunities();
load();
</script>
</body>
</html>
