<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthix — Portfolio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#0a0a0a;--bg3:#141414;--bg4:#1c1c1e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f5f5f7;--text2:#a1a1a6;--text3:#6e6e73;
  --accent:#2997ff;--radius:18px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(0,0,0,0.8);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
  height:48px;display:flex;align-items:center;
}
.nav-inner{max-width:980px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;width:100%}
.nav-logo{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px;text-decoration:none}
.nav-links{display:flex;gap:28px}
.nav-link{font-size:12px;color:var(--text2);text-decoration:none;transition:color .2s;letter-spacing:0.2px}
.nav-link:hover{color:var(--text)}
@media(max-width:600px){.nav-links{display:none}}

/* HERO */
.hero{padding:160px 22px 100px;text-align:center;max-width:980px;margin:0 auto}
.hero-eyebrow{
  font-size:13px;font-weight:500;color:var(--accent);
  letter-spacing:0.5px;text-transform:uppercase;margin-bottom:16px;
  opacity:0;animation:fadeUp .8s .1s ease forwards;
}
.hero h1{
  font-size:clamp(52px,9vw,96px);font-weight:700;
  letter-spacing:-3.5px;line-height:1.0;
  color:var(--text);margin-bottom:22px;
  opacity:0;animation:fadeUp .8s .2s ease forwards;
}
.hero h1 em{
  font-style:normal;
  background:linear-gradient(135deg,#f5f5f7 0%,#6e6e73 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{
  font-size:19px;font-weight:300;color:var(--text2);
  max-width:460px;margin:0 auto;line-height:1.6;letter-spacing:-0.2px;
  opacity:0;animation:fadeUp .8s .3s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* SECTION */
.section{padding:80px 22px;max-width:980px;margin:0 auto}
.section-label{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.section-title{font-size:clamp(28px,4vw,48px);font-weight:700;letter-spacing:-1.5px;color:var(--text);margin-bottom:8px;line-height:1.1}
.section-sub{font-size:17px;font-weight:300;color:var(--text2);margin-bottom:52px;letter-spacing:-0.2px}

/* BENTO GRID */
.bento{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;border-radius:var(--radius);overflow:hidden}
@media(max-width:720px){.bento{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.bento{grid-template-columns:1fr}}

.bento-card{
  background:var(--bg3);position:relative;overflow:hidden;
  aspect-ratio:1;cursor:pointer;
  transition:transform .35s cubic-bezier(.25,.46,.45,.94);
}
.bento-card:first-child{grid-column:span 2;aspect-ratio:2/1}
@media(max-width:720px){.bento-card:first-child{grid-column:span 2;aspect-ratio:2/1}}
@media(max-width:480px){.bento-card:first-child{grid-column:span 1;aspect-ratio:1}}

.bento-card:hover{transform:scale(0.982)}
.bento-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s cubic-bezier(.25,.46,.45,.94)}
.bento-card:hover img{transform:scale(1.05)}
.bento-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.8) 0%,transparent 55%);
  opacity:0;transition:opacity .3s;
  display:flex;align-items:flex-end;padding:20px;
}
.bento-card:hover .bento-overlay{opacity:1}
.bento-name{font-size:16px;font-weight:600;color:#fff;letter-spacing:-0.2px;margin-bottom:3px}
.bento-type{font-size:11px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.5px}

/* EMPTY / LOADING */
.state-box{grid-column:1/-1;padding:100px 20px;text-align:center}
.state-icon{width:60px;height:60px;background:var(--bg4);border-radius:14px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:26px}
.state-title{font-size:19px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:-0.3px}
.state-sub{font-size:14px;color:var(--text3)}
.spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* DIVIDER */
.divider{height:1px;background:var(--border);max-width:980px;margin:0 auto}

/* FOOTER */
footer{padding:44px 22px;border-top:1px solid var(--border);max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.footer-logo{font-size:14px;font-weight:600;color:var(--text3)}
.footer-copy{font-size:12px;color:var(--text3)}

/* LIGHTBOX */
.lightbox{
  position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s ease;padding:20px;
}
.lightbox.open{opacity:1;pointer-events:all}
.lb-inner{max-width:min(88vw,760px);width:100%}
.lb-inner img{width:100%;border-radius:14px;max-height:65vh;object-fit:contain;display:block;margin:0 auto 22px;box-shadow:0 32px 80px rgba(0,0,0,0.6)}
.lb-meta{text-align:center}
.lb-name{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin-bottom:6px}
.lb-desc{font-size:15px;color:var(--text2);font-weight:300;line-height:1.5}
.lb-tag{display:inline-block;margin-top:12px;font-size:11px;font-weight:500;color:var(--accent);background:rgba(41,151,255,0.12);padding:4px 14px;border-radius:20px;letter-spacing:0.5px;text-transform:uppercase}
.lb-close{
  position:fixed;top:18px;right:18px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.1);border:1px solid var(--border2);
  color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.lb-close:hover{background:rgba(255,255,255,0.18);color:var(--text)}

/* REVEAL */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="#">Synthix</a>
    <div class="nav-links">
      <a class="nav-link" href="#portfolio">Portfolio</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">Creative Work</div>
  <h1>Synthix's<br><em>Portfolio.</em></h1>

</div>

<div class="divider"></div>

<!-- PORTFOLIO -->
<section class="section" id="portfolio">
  <div class="reveal">
    <div class="section-label">Work</div>
    <div class="section-title">My Work</div>
    <p class="section-sub" id="portfolio-sub">Loading...</p>
  </div>
  <div class="bento reveal" id="portfolio-grid">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">Loading</div>
      <div class="state-sub">Fetching portfolio...</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">Synthix</div>
  <div class="footer-copy">© 2025 Synthix. All rights reserved.</div>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLb(event)">
  <div class="lb-close" onclick="closeLb()">✕</div>
  <div class="lb-inner">
    <img id="lb-img" src="" alt="">
    <div class="lb-meta">
      <div class="lb-name" id="lb-name"></div>
      <div class="lb-desc" id="lb-desc"></div>
      <div class="lb-tag" id="lb-tag"></div>
    </div>
  </div>
</div>

<script>
// Scroll reveal
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target) } })
}, { threshold: 0.08 })
document.querySelectorAll('.reveal').forEach(el => obs.observe(el))

// Lightbox
function openLb(item) {
  document.getElementById('lb-img').src = item.image_url
  document.getElementById('lb-name').textContent = item.name
  document.getElementById('lb-desc').textContent = item.description || ''
  document.getElementById('lb-tag').textContent = item.type || 'Work'
  document.getElementById('lightbox').classList.add('open')
  document.body.style.overflow = 'hidden'
}
function closeLb(e) {
  if(e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lb-close')) return
  document.getElementById('lightbox').classList.remove('open')
  document.body.style.overflow = ''
}
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = '' }
})

// Load portfolio
async function load() {
  const grid = document.getElementById('portfolio-grid')
  const sub  = document.getElementById('portfolio-sub')
  try {
    const res = await fetch('logos.json?t=' + Date.now())
    if(!res.ok) throw new Error()
    const logos = await res.json()
    grid.innerHTML = ''
    if(!logos.length) {
      sub.textContent = 'No projects yet.'
      grid.innerHTML = `<div class="state-box"><div class="state-icon">🖼️</div><div class="state-title">Nothing here yet</div><div class="state-sub">Check back soon.</div></div>`
      return
    }
    sub.textContent = logos.length + ' project' + (logos.length !== 1 ? 's' : '')
    logos.forEach((item, i) => {
      const c = document.createElement('div')
      c.className = 'bento-card'
      c.innerHTML = `
        <img src="${item.image_url}" alt="${item.name}" loading="${i<3?'eager':'lazy'}" onerror="this.style.background='#1c1c1e'">
        <div class="bento-overlay">
          <div>
            <div class="bento-name">${item.name}</div>
            <div class="bento-type">${item.type||'Work'}</div>
          </div>
        </div>`
      c.addEventListener('click', () => openLb(item))
      grid.appendChild(c)
    })
    obs.observe(grid)
  } catch(e) {
    sub.textContent = ''
    grid.innerHTML = `<div class="state-box"><div class="state-icon">🖼️</div><div class="state-title">Nothing here yet</div><div class="state-sub">Check back soon.</div></div>`
  }
}
load()
</script>
</body>
</html>
